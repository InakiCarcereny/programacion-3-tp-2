<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cine Aurora 📽️ - Registro</title>
  <meta name="description" content="Cine Aurora - Registro" />
  <link rel="icon" href="../assets/favicon/logo-cine.png" />
  <link rel="stylesheet" href="../css/registro/registro.css" />
</head>

<body>
  <header class="header-register">
    <div class="logo-header">
      <h1>Cine Aurora</h1>
      <img src="../assets/favicon/logo-cine.png" alt="logo-cine-aurora" />
    </div>
    <div class="nav-header">
      <nav>
        <a href="../index.html">Inicio</a>
        <a href="./estrenos.html">Próximos estrenos</a>
        <a href="../index.html">Volver</a>
      </nav>
    </div>
  </header>

  <main class="register-main">


    <form action="login.html">



      <div class="left-section">
        <div class="tittle-new-account">
          <h2>Crear<br> nueva cuenta</h2>
        </div>

        <h2 class="tittle-form"><span> 01. </span>Datos Personales</h2>
        <div class="fields-register">
          <label>Nombre Completo</label>
          <input type="text" placeholder="Como aparece en su identificación" />
        </div>
        <div class="fields-register">
          </divclass>
          <label>Email</label>
          <input type="email" placeholder="ejemplo@cineaurora.com" />
        </div>
        <div class="fields-register">
          <label>Fecha de nacimiento</label>
          <input type="date" required />
        </div>
        <div class="form-password">
          <div class="fields-password">
            <label>Contraseña</label>
            <input type="password" pattern=".{6,}" placeholder="•••••••" required />
          </div>
          <div class="fields-password">
            <label>Confirmar contraseña</label>
            <input type="password" pattern=".{6,}" placeholder="•••••••" required />
          </div>
        </div>
      <div class="button-register">
        <button type="submit">Regístrate</button>
      </div>

      </div>

      <div class="right-section">
        <div class="fields-help-cinema">
          <div class="info-help-cinema">
            <h3>Datos para ayudar al cine</h3>
            <p>Estos datos nos ayudan a mejorar tu experiencia.</p>
          </div>
          <div class="input-color">
              <label class="main-label">Elegí tu color favorito para las butacas</label>
              <input type="color" value="#ff0000" class="color-input" />
          </div>

          <div class="input-tickets">
              <label class="main-label">¿Cuántas entradas comprás en general? <span class="range-info">Min: 0 | Max:
                  10</span></label>
              <input type="range" min="0" max="10" class="range-input" />
          </div>

          <div class="input-genre">
              <label class="main-label">Seleccioná tu género favorito</label>
              <select class="select-input">
                <option>Acción</option>
                <option>Drama</option>
                <option>Ciencia ficción</option>
                <option>Terror</option>
                <option>Comedia</option>
                <option>Romance</option>
              </select>
          </div>

          <div class="snacks-container">
              <label class="main-label">Elegí tu snack favorito</label>
              <div class="radio-options">   
                <label class="radio-label"><input type="radio" name="snack" /> Pochoclo dulce</label>
                <label class="radio-label"><input type="radio" name="snack" /> Pochoclo salado</label>
                <label class="radio-label"><input type="radio" name="snack" /> Chocolate</label>
                <label class="radio-label"><input type="radio" name="snack" /> Frutos secos</label>
            </div>
          </div>
        </div>
      </div>


    </form>


  </main>
    <footer class="footer-register">
      <p>&copy; 2026 Cine Aurora - Todos los derechos reservados</p>
    </footer>
</body>

</html>
