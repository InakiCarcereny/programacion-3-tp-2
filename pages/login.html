<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cine Aurora 📽️ - Login</title>
    <meta name="description" content="Cine Aurora - Login" />
    <link rel="icon" href="../assets/favicon/logo-cine.png" />
    <link rel="stylesheet" href="../css/login/login.css" />
  </head>

  <body>
    <header class="main-header">
      <div class="logo-header">
        <h1>Cine Aurora</h1>
        <img src="../assets/favicon/logo-cine.png" alt="logo-cine-aurora" />
      </div>

      <nav class="nav-header">
        <ul>
          <li><a href="../index.html">Inicio</a></li>
          <li><a href="./estrenos.html">Próximos estrenos</a></li>
          <li><a href="../index.html">Volver</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section>
        <form action="perfil.html">
          <h2>Acceso Clientes</h2>

          <div class="input-container">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required />
          </div>

          <div class="input-container">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required />
          </div>

          <button type="submit">Ingresar</button>

          <p>¿No eres miembro? <a href="registro.html">Regístrate</a></p>
        </form>
      </section>
    </main>

    <footer class="main-footer">
      <p>&copy; 2026 Cine Aurora - Todos los derechos reservados</p>
    </footer>
  </body>
</html>
